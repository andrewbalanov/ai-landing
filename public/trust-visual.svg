<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a18"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5C35;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff8a5c;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5C35;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff8a5c;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5C35;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#FF5C35;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FF5C35;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5C35"/>
      <stop offset="100%" style="stop-color:#ff8a5c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="20"/>

  <!-- Abstract glow circles -->
  <circle cx="200" cy="150" r="180" fill="url(#accent1)"/>
  <circle cx="600" cy="350" r="200" fill="url(#accent2)"/>
  <circle cx="450" cy="100" r="120" fill="url(#accent2)"/>

  <!-- Grid lines (subtle) -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="100" y1="400" x2="700" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="50" x2="200" y2="450" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="50" x2="400" y2="450" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="50" x2="600" y2="450" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Connection lines -->
  <line x1="200" y1="200" x2="400" y2="150" stroke="url(#line1)" stroke-width="2"/>
  <line x1="400" y1="150" x2="600" y2="250" stroke="url(#line1)" stroke-width="2"/>
  <line x1="200" y1="200" x2="350" y2="320" stroke="url(#line1)" stroke-width="1.5"/>
  <line x1="350" y1="320" x2="600" y2="250" stroke="url(#line1)" stroke-width="1.5"/>
  <line x1="400" y1="150" x2="500" y2="380" stroke="url(#line1)" stroke-width="1"/>
  <line x1="350" y1="320" x2="500" y2="380" stroke="url(#line1)" stroke-width="1"/>
  <line x1="600" y1="250" x2="500" y2="380" stroke="url(#line1)" stroke-width="1"/>

  <!-- Nodes -->
  <circle cx="200" cy="200" r="12" fill="url(#node)"/>
  <circle cx="200" cy="200" r="20" fill="none" stroke="#FF5C35" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="28" fill="none" stroke="#FF5C35" stroke-width="0.5" opacity="0.15"/>

  <circle cx="400" cy="150" r="14" fill="url(#node)"/>
  <circle cx="400" cy="150" r="22" fill="none" stroke="#FF5C35" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="150" r="30" fill="none" stroke="#FF5C35" stroke-width="0.5" opacity="0.15"/>

  <circle cx="600" cy="250" r="11" fill="url(#node)"/>
  <circle cx="600" cy="250" r="18" fill="none" stroke="#FF5C35" stroke-width="1" opacity="0.3"/>

  <circle cx="350" cy="320" r="10" fill="url(#node)"/>
  <circle cx="350" cy="320" r="16" fill="none" stroke="#FF5C35" stroke-width="1" opacity="0.3"/>

  <circle cx="500" cy="380" r="8" fill="url(#node)"/>
  <circle cx="500" cy="380" r="14" fill="none" stroke="#FF5C35" stroke-width="1" opacity="0.3"/>

  <!-- Small decorative dots -->
  <circle cx="150" cy="120" r="3" fill="#FF5C35" opacity="0.4"/>
  <circle cx="680" cy="150" r="2" fill="#FF5C35" opacity="0.3"/>
  <circle cx="300" cy="400" r="2.5" fill="#FF5C35" opacity="0.35"/>
  <circle cx="650" cy="380" r="2" fill="#FF5C35" opacity="0.25"/>
  <circle cx="250" cy="300" r="1.5" fill="#FF5C35" opacity="0.3"/>
  <circle cx="550" cy="120" r="2" fill="#FF5C35" opacity="0.3"/>

  <!-- Text elements -->
  <text x="170" y="175" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" font-weight="600">AI</text>
  <text x="380" y="130" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" font-weight="600">CRM</text>
  <text x="580" y="230" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" font-weight="600">DATA</text>
  <text x="325" y="300" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600">API</text>
  <text x="480" y="362" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="600">ML</text>
</svg>
